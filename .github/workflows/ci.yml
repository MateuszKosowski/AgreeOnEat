name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  issue-reference:
    name: Issue reference
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Require a closing issue reference
        run: |
          shopt -s nocasematch
          if [[ "$PR_BODY" =~ (close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[[:space:]]*:?[[:space:]]+(\#[0-9]+|https://github\.com/[^/]+/[^/]+/issues/[0-9]+) ]]; then
            exit 0
          fi

          echo "Add a closing reference to the pull request description, for example: Closes #123"
          exit 1

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - user-service
          - household-service
          - recipe-service
          - meal-planning-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml
      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode test
